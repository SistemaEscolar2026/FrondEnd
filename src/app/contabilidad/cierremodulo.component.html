<div style="overflow-y: hidden!important;overflow-x:hidden!important">
    <!--INICIO SESSION BOTONES-->
    <div class="row barra-accion">
        <div class=" col-md-12">
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btngrabar" mat-button (click)="procesar()"><mat-icon class="gren600 ">sync</mat-icon>Procesar</button>
            <mat-divider class="material-devider">|</mat-divider>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btncancelar" mat-button (click)="limpiar()"><mat-icon class="redf600 ">redo</mat-icon>Cancelar</button>
            <mat-divider class="material-devider">|</mat-divider>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnsalir" mat-button (click)="salir()"><mat-icon class="redoff600 ">power_settings_new</mat-icon>Salir</button>
            <mat-divider class="material-devider">|</mat-divider>
            <label class="bordetitulopagina letraGlobalTitulo2 "><span class="d-none d-xl-block">&nbsp;&nbsp;&nbsp;&nbsp;CONTABILIDAD - Cierre Modulo&nbsp;&nbsp;&nbsp;&nbsp;</span></label>
        </div>
    </div>
    <!--FIN SESSION BOTONES-->
</div>
<div class="custom-panel">
    <br />
    <div class="row">
        <div class="col-auto">
        </div>
        <div class="col-md-3">
            <fieldset class="border p-1" style="border-radius: 15px!important;border-color:black!important">
                <legend class="float-none w-auto p-1 letraGlobal">Cierre Modulo</legend>
                <div class="row">
                    <div class="col-auto">
                        <div class="form-group ">
                            <label class="col-form-label negrillas letraGlobal">Año</label>
                        </div>
                    </div>
                    <div class="col-md-5">
                        <div class="form-group ">
                            <input type="number" class="form-control letraGlobal colornone" [(ngModel)]="ne_anio" maxlength="4" onkeypress="return numbersonly(event);" [ngModelOptions]="{standalone: true}" value="0">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-5">
                        <div class="form-check-inline">
                            <label class="form-check-label" for="tipopresentacion">
                                <span class="letraGlobal">&nbsp;Facturacion&nbsp;</span>
                            </label>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="form-check-inline">
                            <input type="checkbox" name="tipopresentacion" id="tipopresentacion" style="display: inherit !important" [(ngModel)]="rb_facturacion" [disabled]="(cierremodulo.ccm_facturacion==='A')?false:true">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-5">
                        <div class="form-check-inline">
                            <label class="form-check-label" for="tipopresentacion">
                                <span class="letraGlobal">&nbsp;Boleto&nbsp;</span>
                            </label>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="form-check-inline">
                            <input type="checkbox" name="tipopresentacion" id="tipopresentacion" style="display: inherit !important" [(ngModel)]="rb_boleto" [disabled]="(cierremodulo.ccm_boleto==='A')?false:true">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-5">
                        <div class="form-check-inline">
                            <label class="form-check-label" for="tipopresentacion">
                                <span class="letraGlobal">&nbsp;Cuenta x Cobrar&nbsp;</span>
                            </label>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="form-check-inline">
                            <input type="checkbox" name="tipopresentacion" id="tipopresentacion" style="display: inherit !important" [(ngModel)]="rb_cxc" [disabled]="(cierremodulo.ccm_cuenta_cobrar==='A')?false:true">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-5">
                        <div class="form-check-inline">
                            <label class="form-check-label" for="tipopresentacion">
                                <span class="letraGlobal">&nbsp;Cuenta x Pagar&nbsp;</span>
                            </label>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="form-check-inline">
                            <input type="checkbox" name="tipopresentacion" id="tipopresentacion" style="display: inherit !important" [(ngModel)]="rb_cxp" [disabled]="(cierremodulo.ccm_cuenta_pagar==='A')?false:true">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-5">
                        <div class="form-check-inline">
                            <label class="form-check-label" for="tipopresentacion">
                                <span class="letraGlobal">&nbsp;Orden de Compra&nbsp;</span>
                            </label>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="form-check-inline">
                            <input type="checkbox" name="tipopresentacion" id="tipopresentacion" style="display: inherit !important" [(ngModel)]="rb_ordencompra" [disabled]="(cierremodulo.ccm_orden_compra==='A')?false:true">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-5">
                        <div class="form-check-inline">
                            <label class="form-check-label" for="tipopresentacion">
                                <span class="letraGlobal">&nbsp;Contabilidad&nbsp;</span>
                            </label>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="form-check-inline">
                            <input type="checkbox" name="tipopresentacion" id="tipopresentacion" style="display: inherit !important" [(ngModel)]="rb_contabilidad" [disabled]="(cierremodulo.ccm_contabilidad==='A')?false:true">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-5">
                        <div class="form-check-inline">
                            <label class="form-check-label" for="tipopresentacion">
                                <span class="letraGlobal">&nbsp;Nomina&nbsp;</span>
                            </label>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="form-check-inline">
                            <input type="checkbox" name="tipopresentacion" id="tipopresentacion" style="display: inherit !important" [(ngModel)]="rb_nomina" [disabled]="(cierremodulo.ccm_nomina==='A')?false:true">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-5">
                        <div class="form-check-inline">
                            <label class="form-check-label" for="tipopresentacion">
                                <span class="letraGlobal">&nbsp;Banco&nbsp;</span>
                            </label>
                        </div>
                    </div>
                    <div class="col-md-7">
                        <div class="form-check-inline">
                            <input type="checkbox" name="tipopresentacion" id="tipopresentacion" style="display: inherit !important" [(ngModel)]="rb_banco" [disabled]="(cierremodulo.ccm_banco==='A')?false:true">
                        </div>
                    </div>
                </div>
            </fieldset>
        </div>

    </div>

    <br />
</div>


<app-modales [llamarModal]="llamarmodal"></app-modales>

<app-report [openReport]="openReport"></app-report>
