<div style="overflow-y: hidden!important;overflow-x:hidden!important">
    <!--INICIO SESSION BOTONES-->
    <div class="row barra-accion">
        <div class=" col-md-12">
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnnuevo" mat-button (click)="nuevo()"><mat-icon class="orange600">search</mat-icon>Nuevo</button>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnmodificar" (click)="modificarfactura();" mat-button><mat-icon class="azul600 ">edit</mat-icon>Modificar</button>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btngrabar" (click)="confirmarguardar(parent)" mat-button><mat-icon class="gren600 ">save</mat-icon>Guardar</button>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btneliminar" (click)="confirmareliminar()" mat-button><mat-icon class="red600 ">close</mat-icon>Eliminar</button>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btncancelar" mat-button (click)="limpiabotones(1);habilitarfrom(4);cancelar();"><mat-icon class="redf600 ">redo</mat-icon>Cancelar</button>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnbuscar" mat-button (click)="buscar()"><mat-icon class="azulbu600 ">plagiarism</mat-icon>buscar</button>
            <mat-divider class="material-devider">|</mat-divider>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnsalir" confirmarguardar (click)="salir()"><mat-icon class="redoff600 ">power_settings_new</mat-icon>Salir</button>
            <mat-divider class="material-devider">|</mat-divider>
            <label class="bordetitulopagina letraGlobalTitulo2 "><span class="d-none d-xl-block">&nbsp;&nbsp;&nbsp;&nbsp;Registro de Factura&nbsp;&nbsp;&nbsp;&nbsp;</span></label>
        </div>
    </div>
    <!--FIN SESSION BOTONES-->
    <div class="custom-panel">
        <div class="row">
            <ngx-barcode6 [bc-format]="'CODE128'"hidden #parent  [bc-height]="60" [bc-width]="4"
                          [bc-value]="datoscla">
            </ngx-barcode6>
            <img id="my-node"   hidden />
            <button hidden (click)="prueba(parent)">prueba</button>
        </div>
        <div class="row">
            <div class="col-md-12">
                <div class="row custom-panel2 b">
                    <div class="col-md-12">
                        <div class="row">
                            <div class="col-md-9">
                                <div class="row">
                                    <div class="col-md-1">
                                        <div class="form-group ">
                                            <label class="col-form-label negrillas letraGlobal">Cliente</label>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="form-group">
                                            <input type="text" class="form-control letraGlobal" [(ngModel)]="iDocumento.cl_nombre" [disabled]="true" maxlength="80" [ngClass]="{ 'is-invalid': submitted && iDocumento.cl_nombre==='' }">
                                            <div *ngIf="submitted && iDocumento.cl_nombre===''" class="invalid-feedback">
                                                <div *ngIf="iDocumento.cl_nombre===''">Cliente es requerido</div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-auto">
                                        <button type="button" class="btn botonpaso letraGlobal mdc-buttoncl" [disabled]="habilitaobjetofrom" style="align-items:inherit!important; min-width: 0px !important; " mat-button (click)="cargaCliente()"> <span style="cursor:pointer"><mat-icon class="azul600 ">plagiarism</mat-icon></span></button>
                                    </div>
                                    <div class="col-md-1">
                                        <div class="form-group ">
                                            <label class="col-form-label negrillas letraGlobal">Factura</label>
                                        </div>
                                    </div>
                                    <div class="col-md-2">
                                        <div class="form-group">
                                            <input type="text" class="form-control letraGlobal" [disabled]="true" [(ngModel)]="iDocumento.fa_numero_factura" maxlength="10">
                                        </div>
                                    </div>
                                    <div class="col-auto">
                                        <div class="form-group ">
                                            <label class="col-form-label negrillas letraGlobal">Fecha Factura</label>
                                        </div>
                                    </div>
                                    <div class="col-md-2">
                                        <div class="form-group">
                                            <input type="date" class="form-control letraGlobal" [disabled]="habilitaobjetofrom" (change)="generaclave()" [(ngModel)]="iDocumento.fa_fecha_factura" maxlength="10">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="row">
                                    <div class="col-md-4">
                                        <div class="form-group ">
                                            <label class="col-form-label negrillas letraGlobal">Fecha Ingreso</label>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group">
                                            <input type="date" class="form-control letraGlobal" [disabled]="true" [(ngModel)]="iDocumento.fa_fecha_ingreso" maxlength="10">
                                        </div>
                                    </div>
                                </div>
                            </div>


                        </div>
                        <div class="row">
                            <div class="col-md-9">
                                <div class="row">
                                    <div class="col-md-1">
                                        <div class="form-group ">
                                            <label class="col-form-label negrillas letraGlobal">Direcci&oacute;n</label>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-group">
                                            <input type="text" class="form-control letraGlobal" [(ngModel)]="iDocumento.cl_direccion" [disabled]="true" maxlength="150">
                                        </div>
                                    </div>
                                    <div class="col-md-3">
                                        <div class="form-group ">
                                            <label class="col-form-label negrillas letraGlobal" *ngIf="isAccion==='M'" style="font-size:14px!important;color:red!important">{{estadofactura}}</label>
                                        </div>
                                    </div>
                                    <div class="col-md-2">
                                        <button type="button" class="btn botonpaso letraGlobal" *ngIf="isAccion==='M'" [disabled]="(iDocumento.fa_estado_electronico !== 'RG')?true:false" mat-button (click)="updateFactura2()"><mat-icon class="orange600">sync</mat-icon>Procesar</button>

                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-1">
                                        <div class="form-group ">
                                            <label class="col-form-label negrillas letraGlobal">Correo</label>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="form-group">
                                            <input type="text" class="form-control letraGlobal" [(ngModel)]="iDocumento.cl_correo" [disabled]="true" maxlength="150">
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-1 ">
                                        <div class="form-group ">
                                            <label class="col-form-label negrillas letraGlobal">Observaci&oacute;n</label>
                                        </div>
                                    </div>
                                    <div class="col-md-11 col-sm-11">
                                        <div class="form-group">
                                            <textarea type="text" rows="30" class="textinput letraGlobal col-md-12 col-sm-12" [(ngModel)]="iDocumento.fa_observacion" maxlength="300" [disabled]="habilitaobjetofrom" value=""></textarea>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-1 ">
                                        <div class="form-group ">
                                            <label class="col-form-label negrillas letraGlobal">Pago Sri</label>
                                        </div>
                                    </div>
                                    <div class="col-md-2">
                                        <div class="form-group">
                                            <select [(ngModel)]="iDocumento.fp_sri_codigo" class="custom-select form-controlselect letraGlobal" panelClass="my-select-panel-class" [disabled]="habilitaobjetofrom" id="inputGroupSelect01" [ngClass]="{ 'is-invalid': submitted && iDocumento.bc_persona_solicita==='' }">
                                                <option [value]="comp.fp_sri_codigo" *ngFor="let comp of listPagoSri">{{comp.fp_sri_descripcion}}</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-auto">
                                        <div class="form-group ">
                                            <label class="col-form-label negrillas letraGlobal">Tipo Factura</label>
                                        </div>
                                    </div>
                                    <div class="col-md-1 ">
                                        <div class="form-group ">
                                            <label class="col-form-label negrillas letraGlobal">Boletos</label>
                                            <input type="radio" name="tiporadio" id="exampleRadios1" [disabled]="habilitaobjetofrom" (change)="cambioradio()" [(ngModel)]="iDocumento.fa_tipofactura" value="B">
                                        </div>
                                    </div>
                                    <div class="col-md-1 ">
                                        <div class="form-group ">
                                            <label class="col-form-label negrillas letraGlobal">Directo</label>
                                            <input type="radio" name="tiporadio" id="exampleRadios1" [disabled]="habilitaobjetofrom" (change)="cambioradio()" [(ngModel)]="iDocumento.fa_tipofactura" value="D">
                                        </div>
                                    </div>
                                    <div class="col-auto">
                                        <div class="form-group ">
                                            <label class="col-form-label negrillas letraGlobal">Tipo Iva</label>
                                        </div>
                                    </div>
                                    <div class="col-md-1 " *ngIf="iDocumento.fa_tipofactura==='D'">
                                        <div class="form-group ">

                                            <label class="col-form-label negrillas letraGlobal">Con Iva/Sin Iva</label>
                                            <input type="radio" name="tiporadioIVA" id="exampleRadios1" [disabled]="habilitaobjetofrom" (change)="cambioradioIVA()" [(ngModel)]="iDocumento.fa_tipo_iva" value="T">
                                        </div>
                                    </div>
                                    <div class="col-md-1 ">
                                        <div class="form-group ">
                                            <label class="col-form-label negrillas letraGlobal">Incluye Iva</label>
                                            <input type="radio" name="tiporadioIVA" id="exampleRadios1" [disabled]="habilitaobjetofrom" (change)="cambioradioIVA()" [(ngModel)]="iDocumento.fa_tipo_iva" value="S">
                                        </div>
                                    </div>
                                    <div class="col-md-1 ">
                                        <div class="form-group ">
                                            <label class="col-form-label negrillas letraGlobal">Omitir Iva</label>
                                            <input type="radio" name="tiporadioIVA" id="exampleRadios1" [disabled]="habilitaobjetofrom" (change)="cambioradioIVA()" [(ngModel)]="iDocumento.fa_tipo_iva" value="N">
                                        </div>
                                    </div>
                                    <div class="col-md-2">
                                        <div class="form-group ">
                                            <label class="col-form-label negrillas letraGlobal">No Objeto de Imp</label>
                                            <input type="radio" name="tiporadioIVA" id="exampleRadios1" [disabled]="habilitaobjetofrom" (change)="cambioradioIVA()" [(ngModel)]="iDocumento.fa_tipo_iva" value="O">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="row">
                                    <div class="col-md-12" style="border-radius: 15px !important; border: solid 1px #000000!important ">
                                        <div class="row">
                                            <div class="col-md-5">
                                                <div class="form-group ">
                                                    <label class="col-form-label negrillas letraGlobal colorBrown ">Subtotal</label>
                                                </div>
                                            </div>
                                            <div class="col-md-7">
                                                <div class="form-group">
                                                    <input type="text" class="form-control letraGlobal colorfondo" maxlength="20" [disabled]="habilitaobjetofrom" value="{{iDocumento.fa_subtotal | number : '1.2-2'}}">
                                                </div>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-5">
                                                <div class="form-group ">
                                                    <label class="col-form-label negrillas letraGlobal colornegro ">No Objeto de Impuesto</label>
                                                </div>
                                            </div>
                                            <div class="col-md-7">
                                                <div class="form-group">
                                                    <input type="text" class="form-control letraGlobal colorfondonegro colorGreen" maxlength="20" [disabled]="habilitaobjetofrom" value="{{iDocumento.fa_subtotalnoexento | number : '1.2-2'}}">
                                                </div>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-5">
                                                <div class="form-group ">
                                                    <label class="col-form-label negrillas letraGlobal colornegro ">Exento</label>
                                                </div>
                                            </div>
                                            <div class="col-md-7">
                                                <div class="form-group">
                                                    <input type="text" class="form-control letraGlobal colorfondonegro colorGreen" maxlength="20" [disabled]="habilitaobjetofrom" value="{{iDocumento.fa_subtotalexento | number : '1.2-2'}}">
                                                </div>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-5">
                                                <div class="form-group ">
                                                    <label class="col-form-label negrillas letraGlobal colorNavy ">Gravable</label>
                                                </div>
                                            </div>
                                            <div class="col-md-7">
                                                <div class="form-group">
                                                    <input type="text" class="form-control letraGlobal colorfondonegro colorwhite" maxlength="20" [disabled]="habilitaobjetofrom" value="{{iDocumento.fa_baseiva | number : '1.2-2'}}">
                                                </div>
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-5">
                                                <div class="form-group ">
                                                    <label class="col-form-label negrillas letraGlobal colorBrown ">Impuestos</label>
                                                </div>
                                            </div>
                                            <div class="col-md-7">
                                                <div class="form-group">
                                                    <input type="text" class="form-control letraGlobal colorfondo" maxlength="10" [disabled]="true" value="{{iDocumento.fa_iva | number : '1.2-2'}}">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <br />
                                <div class="row" style="border-radius: 15px !important; border: solid 1px #000000!important ">
                                    <div class="col-md-12">
                                        <div class="row">
                                            <div class="col-md-3">
                                                <div class="form-group ">
                                                    <label class="col-form-label negrillas letraGlobal colorNavy " style="font-size:18px!important">TOTAL</label>
                                                </div>
                                            </div>
                                            <div class="col-md-9">
                                                <div class="form-group">
                                                    <input type="text" class="form-control letraGlobal colorfondonegro colorwhite" style="font-size:20px!important;height:35px!important" maxlength="10" [disabled]="true" value="{{iDocumento.fa_total | number : '1.2-2'}}">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>

                <br />

                <div class="row custom-panel2 b">
                    <div id="no-more-tables" class="col-md-12">
                        <div class="row">
                            <div class="col-md-11">
                                <div id="global350" class="material-datatables table-responsive">
                                    <table responsive="true" class="letraGlobal table table-hover text-nowrap  table-bordered " cellspacing="0">
                                        <thead style="zoom:85%; border: solid 1px #ABBAD0!important">
                                            <tr class="cabeceragrid letraGlobal">
                                                <th rowspan="2" scope="col">CODIGO</th>
                                                <th rowspan="2" scope="col">DESCRIPCION</th>
                                                <th rowspan="2" scope="col" *ngIf="iDocumento.fa_tipofactura==='D'">CANTIDAD</th>
                                                <th rowspan="2" scope="col">BASE 0</th>
                                                <th rowspan="2" scope="col">BASE IVA</th>
                                                <th rowspan="2" scope="col">No Objeto de Impuesto</th>
                                                <th rowspan="2" scope="col">SUBTOTAL</th>
                                                <th rowspan="2" scope="col">IVA</th>
                                                <th rowspan="2" scope="col">TOTAL</th>
                                            </tr>
                                        </thead>
                                        <tbody class="cuerpogrid">
                                            <tr *ngFor="let row of detalleregistrofactura " class="clsForeColor{{row.color}}">
                                                <td data-title="CODIGO" (click)="clickGridp(row);" style="text-align: right !important; vertical-align: middle; width: 100px ">
                                                    <input type="text" class="form-control letraGlobal  " maxlength="25" style="align-content: center; vertical-align: middle; " [disabled]="(iDocumento.fa_tipofactura==='B')?true:false" [(ngModel)]="row.fd_codigo_linea">
                                                </td>
                                                <td data-title="DESCRIPCION" (click)="clickGridp(row);" style="text-align: right !important; vertical-align: middle; width: 350px ">
                                                    <textarea type="text" rows="30" class="textinput letraGlobal bordeno " [(ngModel)]="row.fd_descripcion" maxlength="300" [disabled]="habilitaobjetofrom" value=""></textarea>
                                                </td>
                                                <td data-title="CANTIDAD" (click)="clickGridp(row);" *ngIf="iDocumento.fa_tipofactura==='D'" style="text-align: right !important; vertical-align: middle; width: 50px ">
                                                    <input type="text" class="form-control letraGlobal  " maxlength="8" style="text-align: right !important; vertical-align: middle; align-content: center; " (input)="calculoiva(row)" [disabled]="(iDocumento.fa_tipofactura==='D')?false:true" onkeypress="return isNumberKey(this,event,0);" [(ngModel)]="row.fd_cantidad">
                                                </td>
                                                <td data-title="BASE 0" (click)="clickGridp(row);" style="text-align: right !important; vertical-align: middle; width: 50px ">
                                                    <input type="text" class="form-control letraGlobal  " maxlength="8" style="text-align: right !important; vertical-align: middle; align-content: center; " (input)="calculoiva(row)" [disabled]="(iDocumento.fa_tipo_iva==='T')?false:((iDocumento.fa_tipo_iva==='N')?false:true)" onkeypress="return isNumberKey(this,event,3);" [(ngModel)]="row.fd_base0">
                                                </td>
                                                <td data-title="BASE IVA" (click)="clickGridp(row);" style="text-align: right !important; vertical-align: middle; width: 50px ">
                                                    <input type="text" class="form-control letraGlobal  " maxlength="8" style="text-align: right !important; vertical-align: middle; align-content: center;" (input)="calculoiva(row)" [disabled]="(iDocumento.fa_tipo_iva==='T')?false:((iDocumento.fa_tipo_iva==='S')?false:true)" onkeypress="return isNumberKey(this,event,3);" [(ngModel)]="row.fd_baseiva">
                                                </td>
                                                <td data-title="No Objeto de Impuesto" (click)="clickGridp(row);" style="text-align: right !important; vertical-align: middle; width: 50px ">
                                                    <input type="text" class="form-control letraGlobal  " maxlength="8" style="text-align: right !important; vertical-align: middle; align-content: center;" (input)="calculoiva(row)" [disabled]="(iDocumento.fa_tipo_iva==='T')?false:((iDocumento.fa_tipo_iva==='O')?false:true)" onkeypress="return isNumberKey(this,event,3);" [(ngModel)]="row.fd_nobaseiva">
                                                </td>
                                                <td data-title="SUBTOTAL" (click)="clickGridp(row);" style="text-align: right !important; vertical-align: middle; width: 50px ">{{row.fd_subtotal | number : '1.2-2'}}</td>
                                                <td data-title="IVA" (click)="clickGridp(row);" style="text-align: right !important; align-content: center;vertical-align:middle; width: 50px ">{{row.fd_iva | number : '1.2-2'}}</td>
                                                <td data-title="TOTAL" (click)="clickGridp(row);" style="text-align: right !important; align-content: center; vertical-align: middle; width: 50px ">{{row.fd_total | number : '1.2-2'}}</td>
                                            </tr>
                                        </tbody>
                                        <tfoot *ngIf="detalleregistrofactura.length>0">
                                            <tr>
                                                <th colspan="8"></th>
                                                <th style="text-align: right !important; width: 50px ">{{totalColumna(2)}}</th>
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>
                            </div>
                            <div class="col-md-1">
                                <div class="row">
                                    <div class="col-md-12">
                                        <button type="button" class="btn botonpaso letraGlobal mdc-buttoncl amumen" [disabled]="habilitaobjetofrom" (click)="agregarlinea()" mat-button><mat-icon class="gren600 ">add</mat-icon></button>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-12">
                                        <button type="button" class="btn botonpaso letraGlobal mdc-buttoncl amumen" [disabled]="habilitaobjetofrom" (click)="borrarlinea()" mat-button><mat-icon class="red600 ">remove</mat-icon></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<ng-template #modalbusquedaboletocm style="z-index:50000">
    <div class=" modal-primary modal-lg" role="document" dynamicHeight dynamicweiht>
        <div class="modal-content ">
            <div class="modal-body">
                <app-busquedaboletoch (confirmacionCierre)="cierreBoletocm($event)" (cierreModal)="cierreModal($event)" [listadoboleto]="listboleto"></app-busquedaboletoch>
            </div>
        </div>
    </div>
</ng-template>


<ng-template #modalbusquedafactura style="z-index:50000">
    <div class=" modal-primary modal-lg" role="document" dynamicHeight dynamicweiht>
        <div class="modal-content ">
            <div class="modal-body">
                <app-busquedafactura (confirmacionCierre)="cierreFacturacm($event)" (cierreModal)="cierreModalcliente($event)" [listadoboleto]="listfacturas"></app-busquedafactura>
            </div>
        </div>
    </div>
</ng-template>

<ng-template #modalbusquedaentidad style="z-index:50000">
    <div class=" modal-primary modal-lg" role="document" dynamicHeight dynamicweiht>
        <div class="modal-content ">
            <div class="modal-body">
                <app-busquedaentidad (confirmacionCierre)="cierreCliente($event)" (cierreModal)="cierreModalcliente($event)" [listadocliente]="listcliente"></app-busquedaentidad>
            </div>
        </div>
    </div>
</ng-template>




<app-modales [llamarModal]="llamarmodal" (aceptarOk)="aceptarOk($event)" (aceptarConfi)="aceptarConfi($event)" (aceptarConfieli)="aceptarConfiEli($event)"></app-modales>
