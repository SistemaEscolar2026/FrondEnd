<form [formGroup]="parametrofrom" (ngSubmit)="guardargrupo()">
  <!--INICIO SESSION BOTONES-->
  <div class="row barra-accion">
    <div class=" col-md-12">
      <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnnuevo" mat-button (click)="limpiabotones(2);habilitarfrom(2);"><mat-icon class="orange600">search</mat-icon>Nuevo</button>
      <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnmodificar" (click)="habilitarfrom(3);limpiabotones(2);" mat-button><mat-icon class="azul600 ">edit</mat-icon>Modificar</button>
      <button type="submit" class="btn botonpaso letraGlobal" [disabled]="botones.btngrabar" mat-button><mat-icon class="gren600 ">save</mat-icon>Guardar</button>
      <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btneliminar" (click)="deletetipoauxiliar()" mat-button><mat-icon class="red600 ">close</mat-icon>Eliminar</button>
      <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btncancelar" mat-button (click)="limpiabotones(1);limpiarparametro();habilitarfrom(1);"><mat-icon class="redf600 ">redo</mat-icon>Cancelar</button>
      <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnbuscar" mat-button (click)="buscar()"><mat-icon class="azulbu600 ">plagiarism</mat-icon>buscar</button>
      <mat-divider class="material-devider">|</mat-divider>
      <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnsalir" mat-button (click)="salir()"><mat-icon class="redoff600 ">power_settings_new</mat-icon>Salir</button>
      <mat-divider class="material-devider">|</mat-divider>
      <label class="bordetitulopagina letraGlobalTitulo2 "><span class="d-none d-xl-block">&nbsp;&nbsp;&nbsp;&nbsp;Mantenimiento de Auxiliares&nbsp;&nbsp;&nbsp;&nbsp;</span></label>
    </div>
  </div>
  <!--FIN SESSION BOTONES-->
  <div class="custom-panel">
      <div class="row" *ngIf="iAccion==='M'">
          <div class="col-md-1">
              <div class="form-group ">
                  <label class="col-form-label negrillas letraGlobal">Codigo</label>
              </div>
          </div>
          <div class="col-md-1 ">
              <div class="form-group">
                  <input type="text" class="form-control letraGlobal" formControlName='coacodigo' name="coacodigo" [disabled]="true" maxlength="6" onkeypress="return isNumberKey(this,event,3);">
              </div>
          </div>
      </div>
      <div class="row">
          <div class="col-md-1">
              <div class="form-group ">
                  <label class="col-form-label negrillas letraGlobal">Tipo Auxiliar<span class="obligatorio">*</span></label>
              </div>
          </div>
          <div class="col-md-2">
              <div class="form-group">
                  <select formControlName="codtipoauxiliar" class="custom-select form-controlselectbarra  letraGlobal" style="width: 100%!important" panelClass="my-select-panel-class" id="inputGroupSelect01" required="required" [ngClass]="{ 'is-invalid': submitted && f['codtipoauxiliar'].errors }">
                      <option [value]="comp.cta_codigo" *ngFor="let comp of listtipoauxliar">{{comp.cta_descripcion}}</option>
                  </select>
                  <div *ngIf="submitted && f['codtipoauxiliar'].errors" class="invalid-feedback">
                      <div *ngIf="f['codtipoauxiliar'].errors['required']">Codigo Tipo Auxiliar</div>
                  </div>
              </div>
          </div>
      </div>
      <div class="row">
          <div class="col-lg-1 col-md-1 col-sm-1 col-xs-1 ">
              <div class="form-group ">
                  <label class="col-form-label negrillas letraGlobal">Codigo Auxiliar<span class="obligatorio">*</span></label>
              </div>
          </div>
          <div class="col-md-2">
              <div class="form-group">
                  <input type="text" class="form-control letraGlobal" formControlName='codauxiliar' name="codauxiliar" maxlength="10" required="required" [ngClass]="{ 'is-invalid': submitted && f['codauxiliar'].errors }">
                  <div *ngIf="submitted && f['codauxiliar'].errors" class="invalid-feedback">
                      <div *ngIf="f['codauxiliar'].errors['required']">Codigo Auxiliar</div>
                  </div>
              </div>
          </div>
      </div>
      <div class="row">
          <div class="col-lg-1 col-md-1 col-sm-1 col-xs-1 ">
              <div class="form-group ">
                  <label class="col-form-label negrillas letraGlobal">Descripcion<span class="obligatorio">*</span></label>
              </div>
          </div>
          <div class="col-lg-3 col-md-3 col-sm-3 col-xs-3 ">
              <div class="form-group">
                  <input type="text" class="form-control letraGlobal" formControlName='descripcion' name="descripcion" maxlength="100" required="required" [ngClass]="{ 'is-invalid': submitted && f['descripcion'].errors }">
                  <div *ngIf="submitted && f['descripcion'].errors" class="invalid-feedback">
                      <div *ngIf="f['descripcion'].errors['required']">Descripcion es requerido</div>
                  </div>
              </div>
          </div>
      </div>
      <div class="row">
          <div class="col-lg-1 col-md-1 col-sm-1 col-xs-1 ">
              <div class="form-group ">
                  <label class="col-form-label negrillas letraGlobal">Estado</label>
              </div>
          </div>
          <div class="col-lg-2 col-md-2 col-sm-2 col-xs-2 ">
              <div class="form-group">
                  <select formControlName='estado' name="estado" class="custom-select form-controlselect letraGlobal" panelClass="my-select-panel-class" id="inputGroupSelect01">
                      <option [value]="comp.valor" *ngFor="let comp of listEstado">{{comp.texto}}</option>
                  </select>
              </div>
          </div>
      </div>
  </div>
</form>

<ng-template #modalbusquedaauxiliar style="z-index:50000">
  <div class=" modal-primary modal-lg" role="document" dynamicHeight dynamicweiht>
    <div class="modal-content ">
      <div class="modal-body">
        <app-busquedaauxiliar (confirmacionCierre)="cierreParametro($event)" (cierreModal)="cierreModalforma($event)" [listtipoauxiliar]="listgrupo"></app-busquedaauxiliar>
      </div>
    </div>
  </div>
</ng-template>
