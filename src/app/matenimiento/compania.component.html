<form [formGroup]="usuariofrom" (ngSubmit)="guardarusuario()">
    <!--INICIO SESSION BOTONES-->
    <div class="row barra-accion">
        <div class=" col-md-12">
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnnuevo" mat-button (click)="limpiabotones(2);habilitarfrom(2);"><mat-icon class="orange600">search</mat-icon>Nuevo</button>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnmodificar" (click)="habilitarfrom(3);limpiabotones(2);" mat-button><mat-icon class="azul600 ">edit</mat-icon>Modificar</button>
            <button type="submit" class="btn botonpaso letraGlobal" [disabled]="botones.btngrabar" mat-button><mat-icon class="gren600 ">save</mat-icon>Guardar</button>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btneliminar" (click)="deleteusuario()" mat-button><mat-icon class="red600 ">close</mat-icon>Eliminar</button>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btncancelar" mat-button (click)="cancelar();"><mat-icon class="redf600 ">redo</mat-icon>Cancelar</button>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnbuscar" mat-button (click)="buscar()"><mat-icon class="azulbu600 ">plagiarism</mat-icon>buscar</button>
            <mat-divider class="material-devider">|</mat-divider>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnsalir" mat-button (click)="salir()"><mat-icon class="redoff600 ">power_settings_new</mat-icon>Salir</button>
            <mat-divider class="material-devider">|</mat-divider>
            <label class="bordetitulopagina letraGlobalTitulo2 "><span class="d-none d-xl-block">&nbsp;&nbsp;&nbsp;&nbsp;Mantenimiento de Agencia&nbsp;&nbsp;&nbsp;&nbsp;</span></label>
        </div>
    </div>
    <!--FIN SESSION BOTONES-->
    <div class="custom-panel">
        <div class="row">
            <div class="col-md-5">
                <div class="row">
                    <div class="col-md-2">
                        <div class="form-group ">
                            <label class="col-form-label negrillas letraGlobal">Ruc<span class="obligatorio">*</span></label>
                        </div>
                    </div>
                    <div class="col-md-5">
                        <div class="form-group">
                            <input type="text" class="form-control letraGlobal" formControlName='co_ruc' name="co_ruc" maxlength="13" required="required" [ngClass]="{ 'is-invalid': submitted && f['co_ruc'].errors }">
                            <div *ngIf="submitted && f['co_ruc'].errors" class="invalid-feedback">
                                <div *ngIf="f['co_ruc'].errors['co_ruc']">Ruc es requerido</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-2">
                        <div class="form-group ">
                            <label class="col-form-label negrillas letraGlobal">Nombre<span class="obligatorio">*</span></label>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="form-group">
                            <input type="text" class="form-control letraGlobal" formControlName='co_nombre' name="co_nombre" maxlength="100" required="required" [ngClass]="{ 'is-invalid': submitted && f['co_nombre'].errors }">
                            <div *ngIf="submitted && f['co_nombre'].errors" class="invalid-feedback">
                                <div *ngIf="f['co_nombre'].errors['required']">Nombre Agencia es requerido</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-2">
                        <div class="form-group ">
                            <label class="col-form-label negrillas letraGlobal">Dirección</label>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="form-group">
                            <input type="text" class="form-control letraGlobal" formControlName='co_direccion' maxlength="100" name="co_direccion">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-2">
                        <div class="form-group ">
                            <label class="col-form-label negrillas letraGlobal">Telefono</label>
                        </div>
                    </div>
                    <div class="col-md-5">
                        <div class="form-group">
                            <input type="text" class="form-control letraGlobal" formControlName='co_telefono' maxlength="20" name="co_telefono">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-2">
                        <div class="form-group ">
                            <label class="col-form-label negrillas letraGlobal">Estado</label>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="form-group">
                            <select formControlName='co_estado' name="co_estado" class="custom-select form-controlselect letraGlobal" panelClass="my-select-panel-class" id="inputGroupSelect01">
                                <option [value]="comp.valor" *ngFor="let comp of listEstado">{{comp.texto}}</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-2">
                        <div class="form-group ">
                            <label class="col-form-label negrillas letraGlobal">Representante Legal</label>
                        </div>
                    </div>
                    <div class="col-md-5">
                        <div class="form-group">
                            <input type="email" class="form-control letraGlobal" formControlName='co_representante_legal' maxlength="400" name="co_representante_legal">
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-1">
                <div class="row">
                    <img formControlName='imagen' src="{{imagen}}" class="col-md-12" style="border: 1px solid #000;height:150px" />
                    <button type="button" class="btn botonpaso letraGlobal" (click)="fileInput.click()" mat-button><mat-icon class="red600 ">cloud_upload</mat-icon></button>
                    <input hidden (change)="handleFileInput($event)" [disabled]="habilitabotones" #fileInput type="file" accept=".jpeg,.jpg,.png">
                </div>

            </div>
        </div>

    </div>
</form>

<ng-template #modalbusquedacompania style="z-index:50000">
    <div class=" modal-primary modal-lg" role="document" dynamicHeight dynamicweiht>
        <div class="modal-content ">
            <div class="modal-body">
                <app-busquedacompania (confirmacionCierre)="cierreUsuario($event)" (cierreModal)="cierreModalusuario($event)" [listacompania]="listacompania"></app-busquedacompania>
            </div>
        </div>
    </div>
</ng-template>

<app-modales [llamarModal]="llamarmodal" (aceptarOk)="aceptarOk($event)" (aceptarConfi)="aceptarConfi($event)" ></app-modales>
