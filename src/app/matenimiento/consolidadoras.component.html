<form [formGroup]="consolidorafrom" (ngSubmit)="guardarconsolidador()">
    <!--INICIO SESSION BOTONES-->
    <div class="row barra-accion">
        <div class=" col-md-12">
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnnuevo" mat-button (click)="limpiabotones(2);habilitarfrom(2);"><mat-icon class="orange600">search</mat-icon>Nuevo</button>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnmodificar" (click)="habilitarfrom(3);limpiabotones(2);" mat-button><mat-icon class="azul600 ">edit</mat-icon>Modificar</button>
            <button type="submit" class="btn botonpaso letraGlobal" [disabled]="botones.btngrabar" mat-button><mat-icon class="gren600 ">save</mat-icon>Guardar</button>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btneliminar" (click)="deleteconsolidador()" mat-button><mat-icon class="red600 ">close</mat-icon>Eliminar</button>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btncancelar" mat-button (click)="limpiabotones(1);limpiarconsolidador();habilitarfrom(1);"><mat-icon class="redf600 ">redo</mat-icon>Cancelar</button>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnbuscar" mat-button (click)="buscar()"><mat-icon class="azulbu600 ">plagiarism</mat-icon>buscar</button>
            <mat-divider class="material-devider">|</mat-divider>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnsalir" mat-button (click)="salir()"><mat-icon class="redoff600 ">power_settings_new</mat-icon>Salir</button>
            <mat-divider class="material-devider">|</mat-divider>
            <label class="bordetitulopagina letraGlobalTitulo2 "><span class="d-none d-xl-block">&nbsp;&nbsp;&nbsp;&nbsp;Mantenimiento de Consolidadoras&nbsp;&nbsp;&nbsp;&nbsp;</span></label>
        </div>
    </div>
    <!--FIN SESSION BOTONES-->
    <div class="custom-panel">
        <div class="row" *ngIf="iAccion==='M'">
            <div class="col-md-1">
                <div class="form-group ">
                    <label class="col-form-label negrillas letraGlobal">Codigo</label>
                </div>
            </div>
            <div class="col-md-1 ">
                <div class="form-group">
                    <input type="text" class="form-control letraGlobal" formControlName='comcodigo' name="comcodigo" [disabled]="true" maxlength="6" onkeypress="return isNumberKey(this,event,3);">
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-1 col-md-1 col-sm-1 col-xs-1 ">
                <div class="form-group ">
                    <label class="col-form-label negrillas letraGlobal">Consolidadora<span class="obligatorio">*</span></label>
                </div>
            </div>
            <div class="col-lg-3 col-md-3 col-sm-3 col-xs-3 ">
                <div class="form-group">
                    <input type="text" class="form-control letraGlobal" formControlName='nombre' name="nombre" maxlength="100" required="required" [ngClass]="{ 'is-invalid': submitted && f['nombre'].errors }">
                    <div *ngIf="submitted && f['nombre'].errors" class="invalid-feedback">
                        <div *ngIf="f['nombre'].errors['required']">Nombre Consolidadoras es requerido</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-1 col-md-1 col-sm-1 col-xs-1 ">
                <div class="form-group ">
                    <label class="col-form-label negrillas letraGlobal">Observacion</label>
                </div>
            </div>
            <div class="col-lg-3 col-md-3 col-sm-3 col-xs-3 ">
                <div class="form-group">
                    <textarea type="text" rows="30" class="textinput letraGlobal col-md-12 col-sm-12" formControlName='observacion' name="observacion" maxlength="500" value=""></textarea>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-1 col-md-1 col-sm-1 col-xs-1 ">
                <div class="form-group ">
                    <label class="col-form-label negrillas letraGlobal">Comision<span class="obligatorio">*</span></label>
                </div>
            </div>
            <div class="col-lg-3 col-md-3 col-sm-3 col-xs-3 ">
                <div class="form-group">
                    <input type="text" class="form-control letraGlobal" formControlName='comnombre' name="comnombre" maxlength="80" required="required" [ngClass]="{ 'is-invalid': submitted && f['comnombre'].errors }">
                    <div *ngIf="submitted && f['comnombre'].errors" class="invalid-feedback">
                        <div *ngIf="f['comnombre'].errors['required']">Comision es requerido</div>
                    </div>
                </div>
            </div>
            <div class="col-md-1">
                <button type="button" class="btn botonpaso letraGlobal mdc-buttoncl" style="align-items:inherit!important; min-width: 0px !important; " [disabled]="habilita" mat-button (click)="cargaComision()"> <span style="cursor:pointer"><mat-icon class="azul600 ">plagiarism</mat-icon></span></button>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-1 col-md-1 col-sm-1 col-xs-1 ">
                <div class="form-group ">
                    <label class="col-form-label negrillas letraGlobal">Estado</label>
                </div>
            </div>
            <div class="col-lg-2 col-md-2 col-sm-2 col-xs-2 ">
                <div class="form-group">
                    <select formControlName='estado' name="estado" class="custom-select form-controlselect letraGlobal" panelClass="my-select-panel-class" id="inputGroupSelect01">
                        <option [value]="comp.valor" *ngFor="let comp of listEstado">{{comp.texto}}</option>
                    </select>
                </div>
            </div>
        </div>

    </div>
</form>

<ng-template #modalbusquedaconsolidadoras style="z-index:50000">
    <div class=" modal-primary modal-lg" role="document" dynamicHeight dynamicweiht>
        <div class="modal-content ">
            <div class="modal-body">
                <app-busquedaconsolidadora (confirmacionCierre)="cierreConsolidador($event)" (cierreModal)="cierreModalconsolidadora($event)" [listadoconsolidadora]="listconsolidadora"></app-busquedaconsolidadora>
            </div>
        </div>
    </div>
</ng-template>



<ng-template #modalbusquedacomision style="z-index:50000">
    <div class=" modal-primary modal-lg" role="document" dynamicHeight dynamicweiht>
        <div class="modal-content ">
            <div class="modal-body">
                <app-busquedacomision (confirmacionCierre)="cierreComision($event)" (cierreModal)="cierreModalcomision($event)" [listadocomision]="listcomision"></app-busquedacomision>
            </div>
        </div>
    </div>
</ng-template>
