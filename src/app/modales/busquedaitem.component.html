
<div class="row">
  <div class="col-md-12">
    <div class="row">
      <div class="col-12">
        <label class="input-group-text">Ayuda de Items</label>
      </div>
    </div>
    <div class="row">
      <div class="col-md-12">
        <button type="button" class="btn botonpaso letraGlobal d-block d-sm-none d-sm-block d-md-block d-lg-none" mat-button (click)="aceptar()"><mat-icon class="red600 ">check_small</mat-icon>Aceptar</button>
        <button type="button" class="btn botonpaso letraGlobal d-block d-sm-none d-sm-block d-md-block d-lg-none" mat-button (click)="cancelar()"><mat-icon class="redf600 ">redo</mat-icon>Cancelar</button>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <input id="busqueda" type="text" class="busqueda" style="width: 100%; padding: 0.3rem !important " [(ngModel)]="txtbusca" placeholder="Busqueda..."  autocomplete="off" />
      </div>
    </div>
    <div class="row">
      <div id="global" class="col-12">
        <div id="no-more-tables" class="material-datatables table-responsive">
          <table responsive="true" class="letraGlobal table table-striped table-bordered table-sm row-border hover" cellspacing="0">
            <thead>
              <tr class="cabeceragrid">
                <th *ngFor="let head of ColumnaDetalle" scope="col">{{head}} </th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let row of items | grdFilter:{it_descripcion:txtbusca,it_codigo:txtbusca};" class="clsForeColor{{row.color}}">
                <td data-title="Código Ítem" (click)="clickGrid(row);" (dblclick)="dblclickGrid(row);">{{row.it_codigo}}</td>
                <td data-title="Descripción Ítem" (click)="clickGrid(row);" (dblclick)="dblclickGrid(row);">{{row.it_descripcion}}</td>
                <td data-title="Precio" style="text-align: right !important; " (click)="clickGrid(row);" (dblclick)="dblclickGrid(row);">{{row.ip_precio| number : '1.4-4'}}</td>
                <td data-title="Código Bodega" style="text-align: center !important; " (click)="clickGrid(row);" (dblclick)="dblclickGrid(row);">{{row.bo_codigo}}</td>
                <td data-title="Nombre Bodega" (click)="clickGrid(row);" (dblclick)="dblclickGrid(row);">{{row.bo_nombre}}</td>
                <td data-title="Saldo Real" style="text-align: right !important; " (click)="clickGrid(row);" (dblclick)="dblclickGrid(row);">{{row.st_saldo | number : '1.4-4'}}</td>
                <td data-title="Separado Pedidos" style="text-align: right !important; " (click)="clickGrid(row);" (dblclick)="dblclickGrid(row);">{{row.st_cant_reservaxped | number : '1.4-4'}}</td>
                <td data-title="Saldo Disponible" style="text-align: right !important; " (click)="clickGrid(row);" (dblclick)="dblclickGrid(row);">{{row.saldo | number : '1.4-4'}}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
