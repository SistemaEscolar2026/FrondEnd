<div class="row">
  <div class="col-md-12">
    <div class="row">
      <div class="col-12">
        <label class="input-group-text">Ayuda de Orden Compra</label>
      </div>
    </div>
    <div class="row">
      <div class="col-md-12">
        <button type="button" class="btn botonpaso letraGlobal d-block d-sm-none d-sm-block d-md-block d-lg-none" mat-button (click)="aceptar()"><mat-icon class="red600 ">check_small</mat-icon>Aceptar</button>
        <button type="button" class="btn botonpaso letraGlobal d-block d-sm-none d-sm-block d-md-block d-lg-none" mat-button (click)="cancelar()"><mat-icon class="redf600 ">redo</mat-icon>Cancelar</button>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <input id="busqueda" type="text" class="busqueda" style="width: 100%; padding: 0.3rem !important " [(ngModel)]="txtbusca" placeholder="Busqueda..."  autocomplete="off" />
      </div>
    </div>
    <div class="row">
      <div id="global" class="col-12">
        <div id="no-more-tables" class="material-datatables table-responsive letraGlobal">
          <pagination-controls class="my-pagination" previousLabel="Anterior" nextLabel="Siguiente" (pageChange)="paginacion = $event"></pagination-controls>
          <table responsive="true" class="table table-striped table-bordered table-sm row-border hover" cellspacing="0">
            <thead>
              <tr class="cabeceragrid">
                <th *ngFor="let head of ColumnaDetalle" scope="col">{{head}} </th>
              </tr>
            </thead>
            <tbody>
                <tr *ngFor="let row of boletos | grdFilter:{ord_codigo:txtbusca,ord_fecha_registro:txtbusca,pr_nombre:txtbusca,td_nombre:txtbusca}| paginate: { itemsPerPage: 50, currentPage: paginacion }" class="clsForeColor{{row.color}}">
                    <td data-title="N° Orden Compra" (click)="clickGrid(row);" (dblclick)="dblclickGrid(row);">{{row.ord_codigo}}</td>
                    <td data-title="Fecha Orden Compra" (click)="clickGrid(row);" (dblclick)="dblclickGrid(row);">{{row.ord_fecha_registro | date: 'yyyy-MM-dd'}}</td>
                    <td data-title="Proveedor" (click)="clickGrid(row);" (dblclick)="dblclickGrid(row);">{{row.pr_nombre}}</td>
                    <td data-title="Tipo Orden" (click)="clickGrid(row);" (dblclick)="dblclickGrid(row);">{{row.td_nombre}}</td>
                    <td data-title="Total" (click)="clickGrid(row);" style="text-align: right !important;" (dblclick)="dblclickGrid(row);">{{row.ord_total| number : '1.2-2'}}</td>
                </tr>
            </tbody>
          </table>
        </div>
        </div>
    </div>
  </div>
</div>
