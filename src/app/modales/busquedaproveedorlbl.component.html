
<div class="row">
  <div class="col-md-12">
    <div class="row">
      <div class="col-12">
        <label class="input-group-text">{{label}}</label>
      </div>
    </div>
    <div class="row">
      <div class="col-md-12 d-block d-sm-none d-sm-block d-md-block d-lg-none">
        <button type="button" class="btn botonpaso letraGlobal " mat-button (click)="aceptar()"><mat-icon class="red600 ">check_small</mat-icon>Aceptar</button>
        <button type="button" [hidden]="!multiple" class="btn botonpaso letraGlobal " mat-button (click)="quitar()"><mat-icon class="red600 ">check_box_outline_blank</mat-icon>Quitar Selección</button>
        <button type="button" class="btn botonpaso letraGlobal " mat-button (click)="cancelar()"><mat-icon class="redf600 ">redo</mat-icon>Cancelar</button>
      </div>
    </div>
    <div class="row" [hidden]="!multiple">
      <div class="col-md-12 ">
        <div class="row">
          <div class="col-md-3">
            <button type="button" class="btn botonpaso letraGlobal d-none d-sm-block d-sm-none d-md-block" mat-button (click)="aceptar()"><mat-icon class="red600 ">check_small</mat-icon>Aceptar</button>
          </div>
          <div class="col-md-4">
            <button type="button" class="btn botonpaso letraGlobal d-none d-sm-block d-sm-none d-md-block" mat-button (click)="quitar()"><mat-icon class="red600 ">check_box_outline_blank</mat-icon>Quitar Selección</button>
          </div>
          <div class="col-md-3">
            <button type="button" class="btn botonpaso letraGlobal d-none d-sm-block d-sm-none d-md-block" mat-button (click)="cancelar()"><mat-icon class="redf600 ">redo</mat-icon>Cancelar</button>
          </div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <input id="busqueda" type="text" class="busqueda" style="width: 100%; padding: 0.3rem !important " [(ngModel)]="txtbusca" placeholder="Busqueda..." autocomplete="off" />
      </div>
    </div>
    <div class="row">
      <div id="global" class="col-12">
        <div id="no-more-tables" class="material-datatables table-responsive letraGlobal">
          <pagination-controls class="my-pagination" previousLabel="Anterior" nextLabel="Siguiente" (pageChange)="paginacion = $event"></pagination-controls>
          <table responsive="true" class="table table-striped table-bordered table-sm row-border hover" cellspacing="0">
            <thead>
              <tr class="cabeceragrid">
                <th *ngFor="let head of ColumnaDetalle" scope="col">{{head}} </th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let row of proveedores | grdFilter:{prcodigo:txtbusca,prnombre:txtbusca}| paginate: { itemsPerPage: 50, currentPage: paginacion }" class="clsForeColor{{row.color}}">
                <td data-title="" (click)="clickGrid(row);" [hidden]="!multiple" style="text-align: right !important;  "><input type="checkbox" name="exampleRadios" id="exampleRadios1" [(ngModel)]="row.sel" [value]="row.sel"></td>
                <td data-title="Código" (click)="clickGrid(row);" (dblclick)="dblclickGrid(row);">{{row.prcodigo}}</td>
                <td data-title="Descripción" (click)="clickGrid(row);" (dblclick)="dblclickGrid(row);">{{row.prnombre}}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
