<div style="overflow-y: hidden!important;overflow-x:hidden!important">
    <!--INICIO SESSION BOTONES-->
    <div class="row barra-accion">
        <div class=" col-md-12">
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btngrabar" mat-button (click)="procesar()"><mat-icon class="gren600 ">sync</mat-icon>Aplicar</button>
            <mat-divider class="material-devider">|</mat-divider>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btncancelar" mat-button (click)="limpiar()"><mat-icon class="redf600 ">redo</mat-icon>Cancelar</button>
            <mat-divider class="material-devider">|</mat-divider>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnsalir" mat-button (click)="salir()"><mat-icon class="redoff600 ">power_settings_new</mat-icon>Salir</button>
            <mat-divider class="material-devider">|</mat-divider>
            <label class="bordetitulopagina letraGlobalTitulo2 "><span class="d-none d-xl-block">&nbsp;&nbsp;&nbsp;&nbsp;SERVICIO DE RENTAS INTERNAS - Cuadratura de IVA&nbsp;&nbsp;&nbsp;&nbsp;</span></label>
        </div>
    </div>
    <!--FIN SESSION BOTONES-->
</div>
<div class="custom-panel">
    <br />
    <div class="row">
        <div class="col-auto">
        </div>
        <div class="col-md-5">
            <fieldset class="border p-1" style="border-radius: 15px!important;border-color:black!important">
                <legend class="float-none w-auto p-1 letraGlobal">Empleado</legend>
                <div class="row">
                    <div class="col-md-2">
                        <div class="form-group ">
                            <label class="col-form-label negrillas letraGlobal">Empleado</label>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="form-group ">
                            <input type="text" class="form-control letraGlobal" [(ngModel)]="iDocumento.empnombres" [disabled]="true" [ngModelOptions]="{standalone: true}" maxlength="100" required="required">
                        </div>
                    </div>
                    <div class="col-md-1">
                        <button type="button" class="btn botonpaso letraGlobal mdc-buttoncl" style="align-items:inherit!important; min-width: 0px !important; " mat-button (click)="cargaCliente()"> <span style="cursor:pointer"><mat-icon class="azul600 ">plagiarism</mat-icon></span></button>
                    </div>
                </div>
           
            </fieldset>
        </div>
        <div class="col-md-2">
            <fieldset class="border p-1" style="border-radius: 15px!important;border-color:black!important">
                <legend class="float-none w-auto p-1 letraGlobal">Tipo de Presentación</legend>
                <div class="row">
                    <div class="col-md-12">
                        <div class="form-check-inline">
                            <input type="radio" name="tipopresentacion" id="tipopresentacion" style="display: inherit !important" [(ngModel)]="rb_excel" [value]="'N'">
                            <label class="form-check-label" for="tipopresentacion">
                                <span class="letraGlobal">&nbsp;Reporte</span>
                            </label>
                        </div>
                    </div>
                </div>
            </fieldset>
        </div>
    </div>

    <br />
</div>


<ng-template #modalbusquedaempleado style="z-index:50000">
    <div class=" modal-primary modal-lg" role="document" dynamicHeight dynamicweiht>
        <div class="modal-content ">
            <div class="modal-body">
                <app-busquedaempleado [listadoempleado]="listadoempleado" (confirmacionCierre)="cierreEmpleado($event)" (cierreModal)="cierreModalcliente($event)"></app-busquedaempleado>
            </div>
        </div>
    </div>
</ng-template>


<app-modales [llamarModal]="llamarmodal"></app-modales>

<app-report [openReport]="openReport"></app-report>
