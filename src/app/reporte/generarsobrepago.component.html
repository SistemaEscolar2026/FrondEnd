<div style="overflow-y: hidden!important;overflow-x:hidden!important">
    <!--INICIO SESSION BOTONES-->
    <div class="row barra-accion">
        <div class=" col-md-12">
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnbuscar" mat-button (click)="buscar()"><mat-icon class="azulbu600 ">sync</mat-icon>Procesar Sobre Pago</button>
            <mat-divider class="material-devider">|</mat-divider>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnsalir" mat-button (click)="salir()"><mat-icon class="redoff600 ">power_settings_new</mat-icon>Salir</button>
            <mat-divider class="material-devider">|</mat-divider>
            <label class="bordetitulopagina letraGlobalTitulo2 "><span class="d-none d-xl-block">&nbsp;&nbsp;&nbsp;&nbsp;Genera Sobre Pago&nbsp;&nbsp;&nbsp;&nbsp;</span></label>
        </div>
    </div>
    <!--FIN SESSION BOTONES-->
    <div class="custom-panel">
        <div class="row">
            <div class="col-md-3">
                <div class="row custom-panel2 b">

                    <div class="col-md-12">
                        <div class="row">
                            <div class="col-md-2">
                                <div class="form-group ">
                                    <label class="col-form-label negrillas letraGlobal">A&ntilde;o</label>
                                </div>
                            </div>
                            <div class="col-md-5">
                                <div class="form-group ">
                                    <input type="number" class="form-control letraGlobal" [(ngModel)]="nfm_anio" [ngModelOptions]="{standalone: true}" maxlength="4" required="required">
                                </div>
                            </div>
                           
                           
                        </div>
                        <div class="row">
                            <div class="col-md-2">
                                <div class="form-group ">
                                    <label class="col-form-label negrillas letraGlobal">Mes</label>
                                </div>
                            </div>
                            <div class="col-md-5">
                                <div class="form-group ">
                                    <select [(ngModel)]="nfm_mes" class="custom-select form-controlselectbarra  letraGlobal" style="width: 100%!important" panelClass="my-select-panel-class" [ngModelOptions]="{standalone: true}" id="inputGroupSelect01">
                                        <option [value]="comp.mesDec" *ngFor="let comp of listmeses">{{comp.mesD}}</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <br />


            </div>
        </div>
    </div>
</div>

<ng-template #modalbusquedaentidad style="z-index:50000">
    <div class=" modal-primary modal-lg" role="document" dynamicHeight dynamicweiht>
        <div class="modal-content ">
            <div class="modal-body">
                <app-busquedaentidad (confirmacionCierre)="cierreCliente($event)" (cierreModal)="cierreModalcliente($event)" [listadocliente]="listcliente"></app-busquedaentidad>
            </div>
        </div>
    </div>
</ng-template>




<app-modales [llamarModal]="llamarmodal" (aceptarConfi)="aceptarConfi($event)" (aceptarOk)="aceptarOk($event)"></app-modales>
