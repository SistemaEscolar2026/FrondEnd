<div style="overflow-y: hidden!important;overflow-x:hidden!important">
    <!--INICIO SESSION BOTONES-->
    <div class="row barra-accion">
        <div class=" col-md-12">
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnbuscar" mat-button (click)="buscar()"><mat-icon class="azulbu600 ">save</mat-icon>Actualizar</button>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btncancelar" mat-button (click)="cancelar();"><mat-icon class="redf600 ">redo</mat-icon>Cancelar</button>
            <mat-divider class="material-devider">|</mat-divider>
            <button type="button" class="btn botonpaso letraGlobal" [disabled]="botones.btnsalir" mat-button (click)="salir()"><mat-icon class="redoff600 ">power_settings_new</mat-icon>Salir</button>
            <mat-divider class="material-devider">|</mat-divider>
            <label class="bordetitulopagina letraGlobalTitulo2 "><span class="d-none d-xl-block">&nbsp;&nbsp;&nbsp;&nbsp;Mantenimiento Menu Perfil&nbsp;&nbsp;&nbsp;&nbsp;</span></label>
        </div>
    </div>
    <!--FIN SESSION BOTONES-->
    <div class="custom-panel">
        <div class="row">
            <div class="col-md-6">
                <div class="row custom-panel2 b">

                    <div class="col-md-12">
                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-group ">
                                    <label class="col-form-label negrillas letraGlobal">Perfil</label>
                                </div>
                            </div>
                            <div class="col-md-7">
                                <div class="form-group">
                                    <select [(ngModel)]="selectperfil"  [disabled]="(selectperfil!=='')?true:false" class="custom-select form-controlselect letraGlobal" panelClass="my-select-panel-class" id="inputGroupSelect01">
                                        <option [value]="comp.sp_sec" *ngFor="let comp of listperfil">{{comp.sp_nombre}}</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4">
                                <div class="form-group ">
                                    <label class="col-form-label negrillas letraGlobal">Modulo</label>
                                </div>
                            </div>
                            <div class="col-md-7">
                                <div class="form-group">
                                    <select [(ngModel)]="selectmenu" [disabled]="(selectmenu!=='')?true:false" (change)="cambioMenu()" class="custom-select form-controlselect letraGlobal" panelClass="my-select-panel-class" id="inputGroupSelect01">
                                        <option [value]="comp.mo_codigo" *ngFor="let comp of listmodulo">{{comp.mo_descripcion}}</option>
                                    </select>
                                </div>
                            </div>
                        </div>


                    </div>
                </div>
                <br />


                <div class="row custom-panel2 b">
                    <div id="no-more-tables" class="col-md-12">
                        <div class="row">
                            <div class="col-md-5">
                                <select size="10" [(ngModel)]="select_desde" class="col-md-12">
                                    <option [value]="item.pe_codigo" *ngFor="let item of detallereporte">{{item.pe_nombre_pagina}}</option>
                                </select>
                            </div>
                            <div class="col-md-2 text-center" style="text-align:center!important;align-content:center!important">
                                <button type="button" class="btn botonpaso letraGlobal" mat-button (click)="devolver()"><mat-icon class="azulbu600 ">keyboard_double_arrow_left</mat-icon></button>
                                <button type="button" class="btn botonpaso letraGlobal" mat-button (click)="pasar()"><mat-icon class="azulbu600 ">keyboard_double_arrow_right</mat-icon></button>
                            </div>
                            <div class="col-md-5">
                                <select size="10" [(ngModel)]="select_hasta" class="col-md-12">
                                    <option [value]="item.pe_codigo" *ngFor="let item of listaHasta">{{item.pe_nombre_pagina}}</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <br />
            </div>
        </div>
    </div>
</div>





<app-modales [llamarModal]="llamarmodal" (aceptarOk)="aceptarOk($event)"></app-modales>
